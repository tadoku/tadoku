name: build-bazel
on:
  schedule:
    # monthly at 5th of every month
    - cron: "0 0 5 * *"

  workflow_dispatch:
  push:
    paths:
      - "services/**"
      - "tools/ci/**"
      - "BUILD.bazel"
      - ".bazelversion"
      - ".bazelrc"
      - "MODULE.bazel"
      - "MODULE.bazel.lock"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/build-bazel.yaml"
      - "!frontend/**"
jobs:
  build:
    name: Build Tadoku
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup cache
        uses: actions/cache@v4
        with:
          path: "/home/runner/.cache/bazel"
          key: bazel-v5-${{ runner.os }}-${{ hashFiles('.bazelversion', '.bazelrc', 'MODULE.bazel', 'MODULE.bazel.lock', 'go.mod', 'go.sum') }}

      - name: Verify Gazelle
        run: bazel run //:gazelle -- -mode=diff

      - name: Build
        run: bazel build //...

      - name: Check push_images covers all oci_push targets
        run: |
          diff \
            <(bazel query 'kind("oci_push", //services/...)' | sort) \
            <(bazel query 'labels(data, //:push_images)' | sort) \
          || { echo "//:push_images is out of sync with oci_push targets under //services/..." >&2; exit 1; }

      - name: Run tests
        run: bazel test //...

  publish:
    name: Publish Tadoku Images
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup cache
        uses: actions/cache@v4
        with:
          path: "/home/runner/.cache/bazel"
          key: bazel-v5-${{ runner.os }}-${{ hashFiles('.bazelversion', '.bazelrc', 'MODULE.bazel', 'MODULE.bazel.lock', 'go.mod', 'go.sum') }}

      - name: Push images
        run: |
          # Setup credentials for GitHub packages
          mkdir /tmp/docker
          echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u tadoku --password-stdin
          cp /home/runner/.docker/config.json /tmp/docker/config.json

          # Push images
          bazel run //:push_images
