apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tadoku-web
{{TADOKU_WEB_INGRESS_ANNOTATIONS}}
spec:
{{TADOKU_APP_TLS_BLOCK}}
  ingressClassName: {{TADOKU_INGRESS_CLASS}}
  rules:
    - host: {{TADOKU_APP_HOST}}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-webv2
                port:
                  number: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tadoku-api
{{TADOKU_API_INGRESS_ANNOTATIONS}}
spec:
  ingressClassName: {{TADOKU_INGRESS_CLASS}}
  rules:
    - host: {{TADOKU_APP_HOST}}
      http:
        paths:
          - path: /api/internal
            pathType: Prefix
            backend:
              service:
                name: oathkeeper-proxy
                port:
                  number: 4455
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tadoku-auth-web
{{TADOKU_AUTH_WEB_INGRESS_ANNOTATIONS}}
spec:
{{TADOKU_AUTH_TLS_BLOCK}}
  ingressClassName: {{TADOKU_INGRESS_CLASS}}
  rules:
    - host: {{TADOKU_AUTH_HOST}}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-auth
                port:
                  number: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tadoku-auth-stripped
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    konghq.com/strip-path: "true"
{{TADOKU_REDIRECT_ANNOTATION_LINES}}
spec:
  ingressClassName: {{TADOKU_INGRESS_CLASS}}
  rules:
    - host: {{TADOKU_AUTH_HOST}}
      http:
        paths:
          - path: /kratos{{TADOKU_STRIP_PATH_SUFFIX}}
            pathType: {{TADOKU_STRIP_PATH_TYPE}}
            backend:
              service:
                name: kratos-public
                port:
                  number: 80
          - path: /private{{TADOKU_STRIP_PATH_SUFFIX}}
            pathType: {{TADOKU_STRIP_PATH_TYPE}}
            backend:
              service:
                name: kratos-admin
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tadoku-admin-web
{{TADOKU_ADMIN_WEB_INGRESS_ANNOTATIONS}}
spec:
{{TADOKU_ADMIN_TLS_BLOCK}}
  ingressClassName: {{TADOKU_INGRESS_CLASS}}
  rules:
    - host: {{TADOKU_ADMIN_HOST}}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-admin
                port:
                  number: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tadoku-tools-stripped
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    konghq.com/strip-path: "true"
{{TADOKU_REDIRECT_ANNOTATION_LINES}}
spec:
  ingressClassName: {{TADOKU_INGRESS_CLASS}}
  rules:
    - host: {{TADOKU_APP_HOST}}
      http:
        paths:
          - path: /oathkeeper{{TADOKU_STRIP_PATH_SUFFIX}}
            pathType: {{TADOKU_STRIP_PATH_TYPE}}
            backend:
              service:
                name: oathkeeper-api
                port:
                  number: 4456
          - path: /pgweb{{TADOKU_STRIP_PATH_SUFFIX}}
            pathType: {{TADOKU_STRIP_PATH_TYPE}}
            backend:
              service:
                name: pgweb
                port:
                  number: 8081
          - path: /mail{{TADOKU_STRIP_PATH_SUFFIX}}
            pathType: {{TADOKU_STRIP_PATH_TYPE}}
            backend:
              service:
                name: mailhog
                port:
                  number: 8025
